name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Start preview server
        run: |
          APP_ENV=preview \
          NODE_ENV=production \
          PORT=8888 \
          AUTH_PROVIDER=demo \
          DATA_ADAPTER=json \
          CORS_ALLOWED_ORIGINS=http://127.0.0.1:8888 \
          APP_BASE_URL=http://127.0.0.1:8888 \
          node server.mjs &
          echo $! > server.pid

      - name: Smoke test preview server
        run: npm run smoke

      - name: Stop preview server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t player-twin-preview:${{ github.sha }} .

      - name: Run Docker container
        run: |
          docker run -d \
            --name player-twin-preview-test \
            -p 8897:8888 \
            -e APP_ENV=preview \
            -e NODE_ENV=production \
            -e AUTH_PROVIDER=demo \
            -e DATA_ADAPTER=json \
            -e CORS_ALLOWED_ORIGINS=http://127.0.0.1:8897 \
            -e APP_BASE_URL=http://127.0.0.1:8897 \
            player-twin-preview:${{ github.sha }}

      - name: Setup Node for smoke script
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test Docker container
        env:
          SMOKE_BASE_URL: http://127.0.0.1:8897
        run: npm run smoke

      - name: Show container logs
        if: always()
        run: docker logs player-twin-preview-test || true

      - name: Stop Docker container
        if: always()
        run: docker rm -f player-twin-preview-test || true

  staging-foundation:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: player_twin_staging
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d player_twin_staging"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Staging foundation smoke
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/player_twin_staging
          DATABASE_SSL_MODE: disable
        run: npm run smoke:staging
